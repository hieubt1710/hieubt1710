<?xml version="1.0" encoding="UTF-8"?>
<svg fill="none" viewBox="0 0 1000 400" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
    <foreignObject width="100%" height="100%">
        <div xmlns="http://www.w3.org/1999/xhtml" style="width: 100%; height: 100%; margin: 0; padding: 0;">
            <style>
                .wrapper {
                    font-family: 'Courier New', Consolas, Monaco, monospace;
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    justify-content: center;
                    height: 100%;
                    width: 100%;
                    background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
                    border-radius: 10px;
                    border: 1px solid #30363d;
                    box-sizing: border-box;
                    position: relative;
                    overflow: hidden;
                }

                .grid {
                    position: absolute;
                    top: 0; left: 0; right: 0; bottom: 0;
                    background-image:
                        linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
                    background-size: 30px 30px;
                    z-index: 0;
                }

                .content {
                    z-index: 1;
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                }

                /* Terminal Prompt */
                .prompt {
                    color: #3fb950;
                    font-size: 1.8em;
                    font-weight: bold;
                    margin-bottom: 15px;
                    align-self: flex-start;
                    margin-left: -50px;
                }

                .glitch-wrapper {
                    position: relative;
                    height: 90px; 
                    display: flex;
                    justify-content: center;
                    align-items: center;
                }

                h1 {
                    position: absolute;
                    text-align: center;
                    color: #ffffff;
                    font-size: 5em;
                    letter-spacing: 5px;
                    font-weight: bold;
                    margin: 0;
                    white-space: nowrap;
                    text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
                }

                h1:nth-child(1) {
                    animation: glitch1 2.5s infinite;
                }

                h1:nth-child(2) {
                    color: #00fff9;
                    animation: glitch2 2.5s infinite;
                    z-index: -1;
                }

                h1:nth-child(3) {
                    color: #ff00c1;
                    animation: glitch3 2.5s infinite;
                    z-index: -2;
                }

                .subtitle {
                    color: #58a6ff;
                    font-size: 1.6em;
                    margin-top: 40px;
                    font-family: 'Courier New', Consolas, monospace;
                    white-space: nowrap;
                    overflow: hidden;
                    border-right: 3px solid #58a6ff;
                    animation: typing 3s steps(30, end) forwards, blink-caret 0.8s step-end infinite;
                    max-width: 30ch;
                }

                /* Keyframes Glitch */
                @keyframes glitch1 {
                    0%, 10%, 27%, 35%, 50%, 52%, 72%, 80%, 100% { transform: none; opacity: 1; }
                    7% { transform: skew(-0.5deg, -0.9deg); opacity: 0.75; }
                    30% { transform: skew(0.8deg, -0.1deg); opacity: 0.75; }
                    55% { transform: skew(-1deg, 0.2deg); opacity: 0.75; }
                    75% { transform: skew(0.4deg, 1deg); opacity: 0.75; }
                }

                @keyframes glitch2 {
                    0%, 10%, 27%, 35%, 50%, 52%, 72%, 80%, 100% { transform: none; opacity: 0.3; }
                    7% { transform: translate(-3px, -3px); opacity: 0.7; }
                    30% { transform: translate(-5px, -2px); opacity: 0.7; }
                    55% { transform: translate(-5px, -1px); opacity: 0.7; }
                    75% { transform: translate(-3px, -6px); opacity: 0.7; }
                }

                @keyframes glitch3 {
                    0%, 10%, 27%, 35%, 50%, 52%, 72%, 80%, 100% { transform: none; opacity: 0.3; }
                    7% { transform: translate(3px, 3px); opacity: 0.7; }
                    30% { transform: translate(5px, 2px); opacity: 0.7; }
                    55% { transform: translate(5px, 1px); opacity: 0.7; }
                    75% { transform: translate(3px, 6px); opacity: 0.7; }
                }

                /* Keyframes Typing */
                @keyframes typing {
                    from { width: 0; }
                    to { width: 30ch; }
                }

                @keyframes blink-caret {
                    from, to { border-color: transparent; }
                    50% { border-color: #58a6ff; }
                }
            </style>
            
            <div class="wrapper">
                <div class="grid"></div>
                <div class="content">
                    <div class="prompt">&gt; whoami</div>
                    
                    <div class="glitch-wrapper">
                        <h1>Hi, I'm Hieu Bui</h1>
                        <h1>Hi, I'm Hieu Bui</h1>
                        <h1>Hi, I'm Hieu Bui</h1>
                    </div>

                    <!-- ĐÃ SỬA: Hyperland thành Hyprland -->
                    <div class="subtitle">Intern | .NET | Linux Hyprland</div>
                </div>
            </div>
        </div>
    </foreignObject>
</svg>
